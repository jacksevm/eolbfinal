<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#000000" />
<meta name="description" content="Google Sheet Interface App" />
<title>Google Sheet Interface</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}
.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}
th{
    background:#007bff;
    color:white;
}
</style>

</head>

<body>

<div class="container">
    <h2>Save Hathi Alarm Dashboard</h2>
    <button onclick="fetchAlarms()">Load Alarm Data</button>

    <div id="status"></div>

    <table id="alarmTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Status</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="root"></div>

<script>

async function fetchAlarms(){

    document.getElementById("status").innerHTML = "Loading...";

    try{

        const response = await fetch("http://savehathi.com:6800/external_api/fsd/alarm/active?lat=10.8747&lon=76.8445&radius=5000",{
            method:"GET",
            headers:{
                "Authorization":"Bearer YOUR_TOKEN_HERE"
            }
        });

        const data = await response.json();

        let rows = "";

        data.forEach(item => {
            rows += `
                <tr>
                    <td>${item.id || ''}</td>
                    <td>${item.type || ''}</td>
                    <td>${item.status || ''}</td>
                    <td>${item.lat || ''}</td>
                    <td>${item.lon || ''}</td>
                    <td>${item.time || ''}</td>
                </tr>
            `;
        });

        document.querySelector("#alarmTable tbody").innerHTML = rows;
        document.getElementById("status").innerHTML = "Loaded Successfully";

    }catch(error){
        document.getElementById("status").innerHTML = "Error Loading Data";
        console.log(error);
    }

}

</script>

</body>
</html>
